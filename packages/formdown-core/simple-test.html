<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Other Option Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .formdown-field { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 6px; }
        .formdown-other-input { 
            margin-left: 8px; 
            padding: 6px; 
            border: 2px solid #007bff; 
            border-radius: 4px; 
            background-color: #f8f9fa;
        }
        fieldset { border: 1px solid #ddd; padding: 10px; border-radius: 6px; }
        legend { font-weight: bold; }
        .formdown-option-label { display: block; margin: 5px 0; }
        select { padding: 8px; min-width: 200px; }
        h1 { color: #333; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🧪 Simple Other Option Test</h1>
    
    <div id="form-container">
        <!-- Form will be injected here -->
    </div>
    
    <div id="status"></div>
    
    <script type="module">
        try {
            // Import FormDown modules
            const { parseFormdown, generateFormHTML } = await import('./dist/index.js');
            
            // Simple test form
            const formContent = '@country{USA,Canada,UK,*}: s[required]';
            
            // Parse and generate
            const parsed = parseFormdown(formContent);
            const html = generateFormHTML(parsed);
            
            // Inject into page
            document.getElementById('form-container').innerHTML = html;
            
            // Show success
            document.getElementById('status').innerHTML = 
                '<div class="success">✅ Form generated successfully! Try selecting "Other" in the dropdown.</div>';
            
            console.log('✅ SUCCESS: Form loaded without errors');
            console.log('Parsed:', parsed);
            
        } catch (error) {
            console.error('❌ ERROR:', error);
            document.getElementById('status').innerHTML = 
                '<div class="error">❌ Error loading form: ' + error.message + '</div>';
        }
    </script>
</body>
</html>
