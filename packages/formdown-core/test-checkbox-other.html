<!DOCTYPE html>
<html>
<head>
    <title>Checkbox Other Option Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-container { max-width: 600px; margin: 0 auto; }
        .result { margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 4px; }
        pre { background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Checkbox "Other" Option Test</h1>
        <p>This test verifies that checkbox "other" options produce clean data output.</p>
        
        <div id="form-container"></div>
        
        <div class="result">
            <h3>Form Data:</h3>
            <pre id="form-data">{}</pre>
        </div>
        
        <div class="result">
            <h3>Expected:</h3>
            <pre>{ "interests": ["Product Updates", "your_custom_text"] }</pre>
            <p><strong>Not:</strong> <code>{ "interests": ["Product Updates", "_other"], "interests_other": "your_custom_text" }</code></p>
        </div>
    </div>

    <script type="module">
        import { parseFormdown, generateFormHTML } from './dist/index.js';

        const formContent = `
@interests{Product Updates,Bug Reports,Feature Requests,*(Custom Topic)}: c[]
`;

        // Generate form
        const result = parseFormdown(formContent);
        const html = generateFormHTML(result);
        document.getElementById('form-container').innerHTML = html;

        // Listen for form changes
        function updateFormData() {
            const formData = new FormData(document.querySelector('form'));
            const data = {};
            
            // Process form data
            for (const [key, value] of formData.entries()) {
                if (data[key]) {
                    if (Array.isArray(data[key])) {
                        data[key].push(value);
                    } else {
                        data[key] = [data[key], value];
                    }
                } else {
                    data[key] = value;
                }
            }
            
            // Convert single-item arrays back to single values for non-checkbox fields
            for (const [key, value] of Object.entries(data)) {
                if (Array.isArray(value) && value.length === 1) {
                    const input = document.querySelector(`input[name="${key}"]`);
                    if (input && input.type !== 'checkbox') {
                        data[key] = value[0];
                    }
                }
            }
            
            document.getElementById('form-data').textContent = JSON.stringify(data, null, 2);
        }

        // Add event listeners to all form inputs
        setTimeout(() => {
            const form = document.querySelector('form');
            if (form) {
                form.addEventListener('input', updateFormData);
                form.addEventListener('change', updateFormData);
                updateFormData(); // Initial call
            }
        }, 100);
    </script>
</body>
</html>
